services:
  gateway:
    build: .
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: whatsmeow
      POSTGRES_USER: whatsmeow
      POSTGRES_PASSWORD: whatsmeow_secret
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U whatsmeow"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
